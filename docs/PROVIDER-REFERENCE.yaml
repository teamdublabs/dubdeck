# ── Transport Architecture ────────────────────────────────────────────────────
transports:
  CommandProvider:
    description: "Commands run through Transport (SSH or local shell). Parsers are pure functions over captured output."
    providers:
      - libvirt
      - parallels
      - docker
      - compose
      - hyperv
      - xcp
    test_strategy: "FakeTransport fixture — no real SSH in tests"
  ApiProvider:
    description: "Direct HttpClient calls to REST or XML-RPC endpoint. Auth tokens in headers. No shell involved."
    providers:
      - proxmox
    test_strategy: "Mock HttpClient responses in tests"

# ── Quoting Strategy ──────────────────────────────────────────────────────────
quoting_strategy:
  POSIX shell (shlex.quote):
    providers:
      - libvirt
      - parallels
      - docker
      - compose
      - xcp
  PowerShell (ps_quote — single-quoted literals):
    providers:
      - hyperv
  None (URL/path allowlist validation):
    providers:
      - proxmox