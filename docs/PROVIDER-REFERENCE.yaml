  provider:       start   stop   force_stop   suspend   restart   snapshot_list   snapshot_create   logs   disk_stats
  libvirt:        true    true   true         true      false     true           true              false  true
  parallels:      true    true   true         true      false     true           true              false  true
  docker:         true    true   false        false     true      false          false             true   false
  compose:        true    true   false        false     true      false          false             false  false
  hyperv:         true    true   true         true      false     true           true              false  false
  proxmox:        true    true   true         true      false     true           true              false  true
  xcp:            true    true   true         true      false     true           true              false  true

# ── Transport Architecture ────────────────────────────────────────────────────
transports:
  CommandProvider:
    description: "Commands run through Transport (SSH or local shell). Parsers are pure functions over captured output."
    providers:
      - libvirt
      - parallels
      - docker
      - compose
      - hyperv
    test_strategy: "FakeTransport fixture — no real SSH in tests"
  ApiProvider:
    description: "Direct HttpClient calls to REST or XML-RPC endpoint. Auth tokens in headers. No shell involved."
    providers:
      - proxmox
      - xcp
    test_strategy: "Mock HttpClient responses in tests"

# ── Quoting Strategy ──────────────────────────────────────────────────────────
quoting_strategy:
  POSIX shell (shlex.quote):
    providers:
      - libvirt
      - parallels
      - docker
      - compose
  PowerShell (ps_quote — single-quoted literals):
    providers:
      - hyperv
  None (URL/path allowlist validation):
    providers:
      - proxmox
      - xcp
