name: CI

on:
  push:
  pull_request:

jobs:
  # Run secrets scan first; backend/frontend depend on it so a leaked key
  # fails the workflow before burning CI minutes on lint+test. Mirrors the
  # `gitleaks` step in scripts/check.sh — same rules, same exit-code-1
  # fail posture.
  #
  # Installs gitleaks directly from the upstream release tarball rather
  # than via gitleaks/gitleaks-action: the v2 Action was commercialised
  # and now requires a paid license secret. The CLI itself is still
  # Apache-2.0 / free, so invoking it directly is simpler and avoids the
  # licensing surprise. Pin to a specific release for reproducibility;
  # bump the version string in one place when upgrading.
  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # full history — gitleaks scans commits, not just HEAD

      - name: gitleaks
        env:
          GITLEAKS_VERSION: "8.18.4"
        run: |
          set -euo pipefail
          arch="$(uname -m | sed 's/aarch64/arm64/;s/x86_64/amd64/')"
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_${arch}.tar.gz" \
            | tar -xz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version
          gitleaks detect --source . --redact --exit-code 1

  backend:
    needs: secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Ruff check
        working-directory: backend
        run: uv run ruff check .

      - name: Ruff format check
        working-directory: backend
        run: uv run ruff format --check .

      - name: pytest
        working-directory: backend
        run: uv run pytest

  frontend:
    needs: secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node LTS
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Typecheck
        working-directory: frontend
        run: npx tsc -b

      - name: Vitest
        working-directory: frontend
        run: npx vitest run

      - name: Build
        working-directory: frontend
        run: npm run build
