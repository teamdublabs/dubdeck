name: CI

on:
  push:
  pull_request:

jobs:
  # Run secrets scan first; backend/frontend depend on it so a leaked key
  # fails the workflow before burning CI minutes on lint+test. Mirrors the
  # `gitleaks` step in scripts/check.sh — the local script and the CI gate
  # use the same rules and the same exit-code-1 fail posture.
  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history — gitleaks scans commits, not just HEAD

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: false
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  backend:
    needs: secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Ruff check
        working-directory: backend
        run: uv run ruff check .

      - name: Ruff format check
        working-directory: backend
        run: uv run ruff format --check .

      - name: pytest
        working-directory: backend
        run: uv run pytest

  frontend:
    needs: secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node LTS
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Typecheck
        working-directory: frontend
        run: npx tsc -b

      - name: Vitest
        working-directory: frontend
        run: npx vitest run

      - name: Build
        working-directory: frontend
        run: npm run build
